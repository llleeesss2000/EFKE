name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Server dependencies
        run: |
          cd release/Server
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements-server.txt
      - name: Run Server tests
        run: |
          cd release/Server
          . .venv/bin/activate
          python -c "
          from fastapi.testclient import TestClient
          from app.main import app, init_db, recover_queued_jobs, start_job_workers
          init_db()
          recover_queued_jobs()
          start_job_workers()
          client = TestClient(app)
          assert client.get('/health').status_code == 200
          login = client.post('/auth/login', json={'username': 'admin', 'password': '12345'})
          assert login.status_code == 200
          token = login.json()['token']
          H = {'Authorization': f'Bearer {token}'}
          p = client.post('/projects', headers=H, json={'name': 'test', 'template': '自訂'}).json()
          content = b'evidence first test'
          r = client.post('/upload', headers=H, data={'project_id': p['id']}, files={'file': ('test.txt', content, 'text/plain')})
          assert r.status_code == 200
          import time; time.sleep(1)
          r = client.post('/rag/query', headers=H, json={'query': 'evidence', 'mode': 'answer', 'project_ids': [p['id']]})
          assert r.status_code == 200
          client.delete(f'/projects/{p[\"id\"]}', headers=H)
          print('Server tests passed')
          "

  user-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install User dependencies
        run: |
          cd release/User
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements-user.txt
      - name: Run User tests
        run: |
          cd release/User
          . .venv/bin/activate
          python -c "
          from fastapi.testclient import TestClient
          from app.main import app
          client = TestClient(app)
          assert client.get('/').status_code == 200
          assert client.get('/api/config').status_code == 200
          assert client.get('/api/setup/status').status_code == 200
          print('User tests passed')
          "
